<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reabhloid — Estadísticas</title>
  <style>
    body {
      margin: 0;
      padding: 16px;
      font-family: sans-serif;
      background: #111;
      color: #eee;
    }

    h1 { color: chartreuse; margin-bottom: 16px; }
    h2 { color: orangeRed; margin: 0 0 8px 0; }

    a { color: #7cf; text-decoration: none; }
    a:hover { text-decoration: underline; }

    #runs-list { max-width: 860px; }

    .run-card {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 12px 16px;
      margin-bottom: 10px;
    }

    .run-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .run-meta { font-size: 13px; color: #aaa; margin-top: 4px; }

    .run-actions { display: flex; gap: 8px; flex-shrink: 0; }

    button {
      padding: 4px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }

    .btn-view { background: #2a6; color: #fff; }
    .btn-view:hover { background: #3b7; }
    .btn-delete { background: #a33; color: #fff; }
    .btn-delete:hover { background: #c44; }
    .btn-edit { background: #446; color: #fff; }
    .btn-edit:hover { background: #558; }

    .edit-form {
      display: none;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #333;
    }
    .edit-form.open { display: block; }

    .edit-form textarea {
      width: 100%;
      box-sizing: border-box;
      background: #111;
      color: #eee;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 6px;
      font-size: 13px;
      resize: vertical;
      min-height: 60px;
    }

    .stars { display: flex; gap: 6px; margin: 8px 0; align-items: center; }
    .stars span { font-size: 13px; color: #aaa; margin-right: 4px; }
    .star-btn {
      background: none; border: none; cursor: pointer;
      font-size: 22px; padding: 0; line-height: 1; color: #555;
    }
    .star-btn.active { color: #fc4; }

    .edit-actions { display: flex; gap: 8px; margin-top: 8px; }
    .btn-save { background: #46a; color: #fff; }
    .btn-save:hover { background: #57b; }
    .btn-cancel { background: #333; color: #ccc; }
    .btn-cancel:hover { background: #444; }

    #chart-section {
      display: none;
      max-width: 900px;
      margin-top: 20px;
    }

    #chart-title { color: chartreuse; margin-bottom: 6px; }

    #chart-and-board {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      max-width: 880px;
    }

    #board-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
    }
    #board-title {
      color: #aaa;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    #board-canvas {
      border: 1px solid #444;
      image-rendering: pixelated;
      display: block;
    }

    #run-settings {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 20px;
      font-size: 12px;
      color: #aaa;
      margin-bottom: 10px;
      padding: 8px 10px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 4px;
      max-width: 860px;
    }
    #run-settings .setting-group { display: flex; flex-direction: column; gap: 2px; }
    #run-settings .setting-label { color: #666; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }
    #run-settings .setting-val { color: #ccc; }

    #chart-canvas {
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 4px;
    }

    #chart-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
      font-size: 12px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .legend-color {
      width: 12px;
      height: 12px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    #chart-action-bar {
      display: none;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    #back-btn     { background: #444; color: #eee; }
    #back-btn:hover { background: #555; }
    #edit-run-btn { background: #2a3a4a; color: #7df; border: 1px solid #7df; }
    #edit-run-btn:hover { background: #3a4a5a; }
    #delete-run-btn { background: #3a1a1a; color: #f88; border: 1px solid #f88; }
    #delete-run-btn:hover { background: #4a2a2a; }

    #chart-edit-form {
      display: none;
      background: #242424;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 10px;
      margin-bottom: 12px;
    }
    #chart-edit-form.open { display: block; }
    #chart-comment {
      width: 100%; box-sizing: border-box;
      background: #1a1a1a; color: #eee;
      border: 1px solid #444; border-radius: 3px;
      padding: 6px; font-size: 13px; resize: vertical;
    }
    .chart-edit-row {
      display: flex; align-items: center; gap: 6px; margin-top: 8px;
    }
    #chart-save-btn { margin-left: auto; }

    #chart-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      font-size: 13px;
      color: #aaa;
      min-height: 20px;
    }
    #chart-meta .meta-stars { font-size: 18px; color: #fc4; letter-spacing: 1px; }
    #chart-meta .meta-comment { font-style: italic; }

    #loading { color: #888; font-style: italic; }

    /* --- Responsive --- */
    @media (max-width: 900px) {
      #runs-list, #chart-section { max-width: 100%; }
      #chart-and-board { flex-direction: column; }

        #chart-canvas {
        width: 100% !important;
        height: auto !important;
        aspect-ratio: 560 / 480;
        display: block;
      }
      #board-canvas {
        width: 100% !important;
        height: auto !important;
      }
    }

    @media (max-width: 600px) {
      body { padding: 10px; }

      .run-header { flex-direction: column; align-items: flex-start; gap: 6px; }
      .run-actions { width: 100%; }

      button {
        min-height: 40px;
        padding: 6px 12px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <h1>Estadísticas de simulaciones</h1>
  <p><a href="/">← Volver a la simulación</a></p>

  <div id="chart-action-bar">
    <button id="back-btn">← Volver a la lista</button>
    <button id="edit-run-btn">Editar</button>
    <button id="delete-run-btn">Borrar</button>
  </div>

  <div id="runs-list">
    <p id="loading">Cargando runs...</p>
  </div>

  <div id="chart-section">
    <h2 id="chart-title"></h2>
    <div id="chart-meta"></div>
    <div id="run-settings"></div>
    <div id="chart-edit-form">
      <textarea id="chart-comment" rows="2" placeholder="Comentario..."></textarea>
      <div class="chart-edit-row">
        <span>Valoración:</span>
        <button class="star-btn" data-star="1">★</button>
        <button class="star-btn" data-star="2">★</button>
        <button class="star-btn" data-star="3">★</button>
        <button id="chart-clear-stars">✕</button>
        <button id="chart-save-btn">Guardar</button>
        <button id="chart-cancel-btn">Cancelar</button>
      </div>
    </div>
    <div id="chart-and-board">
      <div>
        <canvas id="chart-canvas" width="560" height="480"></canvas>
        <div id="chart-legend"></div>
      </div>
      <div id="board-section">
        <div id="board-title">Estado final</div>
        <canvas id="board-canvas" width="300" height="300"></canvas>
      </div>
    </div>
  </div>

  <script type="module" src="/src/stats.ts"></script>
</body>
</html>
